<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>YMix</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 220px;
      margin: 0;
      padding: 16px;
      background: #1e1e1e;
      color: #f0f0f0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      background: #ff5722;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:hover {
      background: #e64a19;
    }
    button.secondary {
      background: #333;
    }
    button.secondary:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <h1>YMix</h1>
  <button id="openMixer">Открыть миксер</button>
  <button id="openOptions" class="secondary">Настройки</button>
  <script src="popup.js"></script>
</body>
</html>
