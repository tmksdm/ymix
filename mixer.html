<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>YMix — Mixer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: #121212;
      color: #f0f0f0;
      min-height: 100vh;
      box-sizing: border-box;
    }
    h1 { margin: 0 0 24px 0; }
    .decks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1400px;
    }
    .deck {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
    }
    .deck h2 { margin: 0 0 12px 0; font-size: 18px; }
    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }
    .player-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 14px;
      font-size: 14px;
      background: #ff5722;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #e64a19; }
    button:disabled { background: #555; cursor: not-allowed; }
    .status { margin-left: auto; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h1>🎧 YMix — Mixer</h1>

  <div class="decks">
    <section class="deck">
      <h2>Дек A</h2>
      <div class="player-wrap">
        <iframe
          id="frame-a"
          src="player-frame.html?deck=a&video=M7lc1UVf-VE"
          sandbox="allow-scripts allow-same-origin allow-presentation allow-popups"
          allow="autoplay; encrypted-media; fullscreen; picture-in-picture; accelerometer; gyroscope; clipboard-write; web-share"
          allowfullscreen
        ></iframe>
      </div>
      <div class="controls">
        <button class="btn-play" data-deck="a" disabled>▶ Play</button>
        <button class="btn-pause" data-deck="a" disabled>⏸ Pause</button>
        <span class="status" id="status-a">загрузка…</span>
      </div>
    </section>

    <section class="deck">
      <h2>Дек B</h2>
      <div class="player-wrap">
        <iframe
          id="frame-b"
          src="player-frame.html?deck=b&video=dQw4w9WgXcQ"
          sandbox="allow-scripts allow-same-origin allow-presentation allow-popups"
          allow="autoplay; encrypted-media; fullscreen; picture-in-picture; accelerometer; gyroscope; clipboard-write; web-share"
          allowfullscreen
        ></iframe>
      </div>
      <div class="controls">
        <button class="btn-play" data-deck="b" disabled>▶ Play</button>
        <button class="btn-pause" data-deck="b" disabled>⏸ Pause</button>
        <span class="status" id="status-b">загрузка…</span>
      </div>
    </section>
  </div>

  <script src="mixer.js"></script>
</body>
</html>
