<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>YMix — Mixer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: #121212;
      color: #f0f0f0;
      min-height: 100vh;
      box-sizing: border-box;
    }
    h1 { margin: 0 0 16px 0; }

    /* ===== Панель плейлиста ===== */
    .playlist-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: 1400px;
      margin-bottom: 16px;
      padding: 12px 14px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
    }
    .playlist-bar label {
      font-size: 13px;
      color: #ccc;
    }
    .playlist-bar input[type="text"] {
      flex: 1;
      min-width: 280px;
      padding: 8px 10px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #f0f0f0;
      font-family: ui-monospace, monospace;
      font-size: 13px;
    }
    .playlist-bar .bar-status {
      font-size: 12px;
      color: #888;
      flex-basis: 100%;
      min-height: 16px;
    }
    .playlist-bar .bar-status.error { color: #f44336; }
    .playlist-bar .bar-status.ok { color: #4caf50; }

    /* ===== Транспорт (общие кнопки управления) ===== */
    .transport {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: 1400px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
    }
    .transport .now-playing {
      margin-left: 12px;
      font-size: 13px;
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .transport .now-playing strong { color: #f0f0f0; }

    /* ===== Деки ===== */
    .decks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1400px;
    }
    .deck {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      transition: border-color .2s, box-shadow .2s;
    }
    .deck.active {
      border-color: #ff5722;
      box-shadow: 0 0 0 2px rgba(255, 87, 34, .25);
    }
    .deck h2 { margin: 0 0 12px 0; font-size: 18px; }
    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }
    .player-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 14px;
      font-size: 14px;
      background: #ff5722;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #e64a19; }
    button:disabled { background: #555; cursor: not-allowed; }
    button.secondary {
      background: #444;
    }
    button.secondary:hover { background: #555; }
    .status { margin-left: auto; font-size: 12px; color: #888; }

    /* ===== Список треков ===== */
    .tracks {
      max-width: 1400px;
      margin-top: 24px;
    }
    .tracks h2 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #ccc;
    }
    .tracks-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .track {
      display: grid;
      grid-template-columns: 32px 80px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 6px 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .track:hover { background: #232323; }
    .track.current {
      background: #2a1a12;
      border-color: #ff5722;
    }
    .track.current .num { color: #ff5722; font-weight: bold; }
    .track.unavailable { cursor: not-allowed; opacity: .55; }
    .track.unavailable:hover { background: #1a1a1a; }
    .track .num { color: #666; text-align: right; }
    .track img {
      width: 80px;
      height: 45px;
      object-fit: cover;
      border-radius: 2px;
      background: #000;
    }
    .track .title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .track .dur {
      color: #888;
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    .track.unavailable .title { color: #777; font-style: italic; }
    .empty {
      color: #666;
      font-size: 13px;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <h1>🎧 YMix — Mixer</h1>

  <!-- Панель загрузки плейлиста -->
  <div class="playlist-bar">
    <label for="playlistInput">Плейлист:</label>
    <input
      type="text"
      id="playlistInput"
      placeholder="ID плейлиста или ссылка youtube.com/playlist?list=..."
      spellcheck="false"
      autocomplete="off"
    >
    <button id="loadPlaylistBtn">Загрузить</button>
    <span class="bar-status" id="barStatus"></span>
  </div>

  <!-- Транспорт: общие кнопки управления плейлистом -->
  <div class="transport">
    <button id="btnPrev"   class="secondary" disabled title="Предыдущий трек">⏮</button>
    <button id="btnPlay"                     disabled title="Играть">▶ Play</button>
    <button id="btnPause"  class="secondary" disabled title="Пауза">⏸ Pause</button>
    <button id="btnNext"   class="secondary" disabled title="Следующий трек">⏭</button>
    <span class="now-playing" id="nowPlaying">— ничего не играет —</span>
  </div>

  <!-- Деки -->
  <div class="decks">
    <section class="deck" id="deck-a">
      <h2>Дек A</h2>
      <div class="player-wrap">
        <iframe
          id="frame-a"
          src="https://tmksdm.github.io/ymix/player-frame.html?deck=a"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
      <div class="controls">
        <button class="btn-play"  data-deck="a" disabled>▶ Play</button>
        <button class="btn-pause" data-deck="a" disabled>⏸ Pause</button>
        <span class="status" id="status-a">загрузка…</span>
      </div>
    </section>

    <section class="deck" id="deck-b">
      <h2>Дек B</h2>
      <div class="player-wrap">
        <iframe
          id="frame-b"
          src="https://tmksdm.github.io/ymix/player-frame.html?deck=b"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
      <div class="controls">
        <button class="btn-play"  data-deck="b" disabled>▶ Play</button>
        <button class="btn-pause" data-deck="b" disabled>⏸ Pause</button>
        <span class="status" id="status-b">загрузка…</span>
      </div>
    </section>
  </div>

  <!-- Список треков -->
  <section class="tracks">
    <h2>Очередь</h2>
    <ul class="tracks-list" id="tracksList">
      <li class="empty">плейлист не загружен</li>
    </ul>
  </section>

  <script src="playlist.js"></script>
  <script src="mixer.js"></script>
</body>
</html>
